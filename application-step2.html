<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash - Loan Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        
        .step-dot.active {
            background: white;
            transform: scale(1.3);
        }
        
        .content {
            padding: 30px;
        }
        
        h2 {
            color: #333;
            margin-bottom: 5px;
            font-size: 20px;
        }
        
        .step-number {
            color: #667eea;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: #f9f9f9;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .phone-input {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #f9f9f9;
        }
        
        .country-code {
            padding: 0 15px;
            background: #eee;
            height: 100%;
            display: flex;
            align-items: center;
            color: #666;
            font-weight: bold;
        }
        
        .phone-input input {
            border: none;
            background: transparent;
        }
        
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            display: block;
        }
        
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }
        
        .btn {
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        
        .btn-prev {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-prev:hover {
            background: #e0e0e0;
        }
        
        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">EcoCash</div>
            <h1>Loan Application</h1>
            <div class="step-indicator">
                <div class="step-dot"></div>
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
            </div>
        </div>
        
        <div class="content">
            <span class="step-number">Step 2 of 3</span>
            <h2>Personal Information</h2>
            
            <div class="form-row">
                <div class="input-group">
                    <label class="input-label">First Name</label>
                    <input type="text" id="firstName" placeholder="John">
                </div>
                
                <div class="input-group">
                    <label class="input-label">Last Name</label>
                    <input type="text" id="lastName" placeholder="Doe">
                </div>
            </div>
            
            <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" id="email" placeholder="john.doe@example.com">
            </div>
            
            <div class="input-group">
                <label class="input-label">Phone Number</label>
                <div class="phone-input">
                    <div class="country-code">+263</div>
                    <input type="tel" id="phone" placeholder="123456789" maxlength="9">
                </div>
                <span class="hint">Enter 9-10 digits (e.g., 123456789)</span>
            </div>
            
            <div class="button-group">
                <button class="btn btn-prev" onclick="prevStep()">PREVIOUS</button>
                <button class="btn btn-next" onclick="nextStep()">NEXT STEP</button>
            </div>
        </div>
        
        <div class="footer">
            © 2025 EcoCash
        </div>
    </div>

    <script>
        // Get saved data
        let applicationData = JSON.parse(localStorage.getItem('loanApplication')) || {};
        
        // Initialize form with saved values
        document.addEventListener('DOMContentLoaded', function() {
            if (applicationData.firstName) {
                document.getElementById('firstName').value = applicationData.firstName;
            }
            if (applicationData.lastName) {
                document.getElementById('lastName').value = applicationData.lastName;
            }
            if (applicationData.email) {
                document.getElementById('email').value = applicationData.email;
            }
            if (applicationData.phone) {
                document.getElementById('phone').value = applicationData.phone;
            }
            
            // Auto-save on input
            const inputs = ['firstName', 'lastName', 'email', 'phone'];
            inputs.forEach(id => {
                document.getElementById(id).addEventListener('input', function() {
                    applicationData[id] = this.value;
                    localStorage.setItem('loanApplication', JSON.stringify(applicationData));
                });
            });
        });
        
        function prevStep() {
            window.location.href = 'application-step1.html';
        }
        
        function nextStep() {
            // Validate inputs
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!firstName || !lastName || !email || !phone) {
                alert('Please fill in all fields');
                return;
            }
            
            if (!validateEmail(email)) {
                alert('Please enter a valid email address');
                return;
            }
            
            if (phone.length < 9) {
                alert('Please enter a valid phone number (9-10 digits)');
                return;
            }
            
            // Save data
            applicationData.firstName = firstName;
            applicationData.lastName = lastName;
            applicationData.email = email;
            applicationData.phone = phone;
            
            localStorage.setItem('loanApplication', JSON.stringify(applicationData));
            
            // Go to next step
            window.location.href = 'application-step3.html';
        }
        
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
    </script>
</body>
</html>
